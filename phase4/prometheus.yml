global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: otel_collector
    static_configs:
      - targets: ['otel_collector:8888']

  - job_name: jenkins
    static_configs:
      - targets: ['jenkins:8080']
    metrics_path: /prometheus

  - job_name: kafka
    static_configs:
      - targets: ['kafka:9092']
